name: CI/CD Deploy (Staging & Live)

on:
  push:
    branches:
      - staging
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build React (IMPORTANT)
      - name: Build project
        run: npm run build

      # 5️⃣ Deploy backend FIRST (IMPORTANT ORDER)
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            if [ "${{ github.ref_name }}" = "staging" ]; then
              echo "🚀 Deploying to STAGING..."
              cd /home/u548741633/domains/erp.wishery.tech/public_html/staging
              git fetch origin
              git reset --hard origin/staging
            else
              echo "🚀 Deploying to LIVE..."
              cd /home/u548741633/domains/erp.wishery.tech/public_html
              git fetch origin
              git reset --hard origin/main
            fi

            echo "📦 Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader

            echo "🧹 Clearing cache..."
            php artisan optimize:clear

            echo "🗄 Running migrations..."
            php artisan migrate --force

      # 6️⃣ Upload build AFTER (CRITICAL FIX)
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "public/build"
          target: "/home/u548741633/domains/erp.wishery.tech/public_html/${{ github.ref_name == 'staging' && 'staging' || '' }}/public/"
